[project]
name = "CruxDev"
repo = "trinsiklabs/cruxdev"
url = "https://cruxdev.dev"
description = "Autonomous convergence framework for AI-driven development"

[typefully]
api_key_env = "TYPEFULLY_API_KEY"
max_posts_per_day = 3
threadify_releases = true
enabled = true

[github]
repos = ["trinsiklabs/cruxdev"]
issue_monitoring_enabled = true
issue_dry_run = true
release_creation_enabled = false

[content]
website_repo = ""
blog_dir = ""
vs_dir = "docs/vs"

[metrics]
tracking_enabled = true
metrics_file = ".cruxdev/growth/metrics.jsonl"
collection_interval_minutes = 60

[readme]
auto_optimize = true
test_count_source = "cargo test"
tool_count = 52

[llms_txt]
auto_update = true
capabilities = [
    "Multi-dimensional code audit (8 code + 5 doc + 9 form dimensions)",
    "Convergence engine with 2-consecutive-clean-pass criterion",
    "50 MCP tools",
    "5-layer prompt injection defense for GitHub issue monitoring",
    "Autonomous git workflow (commit/push/PR/merge) with safety gates",
    "Autonomous growth engine (Typefully, GitHub Releases, metrics tracking)",
    "Research-converged methodology docs baked into audit dimensions",
]
methodology_docs = [
    "FORM_PATTERNS.md",
    "METRICS_PATTERNS.md",
    "DASHBOARD_PATTERNS.md",
    "RESEARCH_PATTERNS.md",
    "COMPETITORS_PATTERN.md",
    "GROWTH_STRATEGY.md",
    "GROWTH_CYCLE_PUBLIC_INTERACTIONS.md",
]

[ecosystem]
projects = ["crux", "cruxdev", "cruxcli", "cruxvibe"]
shared_typefully = true
